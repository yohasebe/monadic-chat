name: Specs

# Route-contract integration specs run under both IN_CONTAINER modes,
# plus the frontend Jest suite. The dual integration matrix exists
# because every path-resolution defect this codebase has shipped
# (jupyter_helper hard-coded /Users/yohasebe, auto_forge container-vs-host
# path mix-ups) had the same shape: the production (in_container) branch
# worked, the dev (host) branch silently broke. Running the smoke suite
# under both IN_CONTAINER=true and IN_CONTAINER=false catches the
# asymmetry the moment it lands.
#
# The Ruby `unit` suite is intentionally NOT run on CI (since 2026-05-09).
# 26 of its ~4040 specs depend on either (a) a running Python container
# whose image matches the current Dockerfile or (b) provider API keys
# in env (OPENAI_API_KEY, TAVILY_API_KEY, ...). Neither is set up in CI:
# secrets are not provisioned (avoids fork-PR exfil risk + API billing),
# and the python container is not rebuilt in CI. The full unit suite
# runs locally under the developer's full Docker + env setup, where
# release decisions are actually made; CI's role is reduced to the
# environment-independent layers (route smoke + frontend tests) so the
# signal it does emit is genuine. See feedback_release_manifest_drift.md
# for the related operational philosophy.

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  rspec-integration:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        in_container: ['true', 'false']
    name: rspec integration (IN_CONTAINER=${{ matrix.in_container }})
    defaults:
      run:
        working-directory: docker/services/ruby
    env:
      IN_CONTAINER: ${{ matrix.in_container }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          working-directory: docker/services/ruby

      - name: Install GraphViz (used by some unit specs)
        run: sudo apt-get update && sudo apt-get install -y graphviz libgraphviz-dev pkg-config

      - name: Run route-contract integration specs (both IN_CONTAINER modes)
        run: |
          # Retry ONLY transient infrastructure failures (Docker Hub pull
          # timeouts / container startup), not real spec failures. The
          # IN_CONTAINER=false job builds peer containers locally, so a flaky
          # registry pull would otherwise fail the build and email maintainers.
          attempt=1
          max_attempts=3
          while true; do
            set +e
            output=$(bundle exec rspec \
              spec/integration/json_route_contract_spec.rb \
              spec/integration/library_import_contract_spec.rb \
              --format progress 2>&1)
            code=$?
            set -e
            echo "$output"
            if [ "$code" -eq 0 ]; then
              exit 0
            fi
            if echo "$output" | grep -qiE "Container startup timeout|failed to solve|i/o timeout|context deadline exceeded|registry-1\.docker\.io|TLS handshake timeout|temporary failure in name resolution"; then
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "::warning::Transient container/registry failure persisted after ${max_attempts} attempts"
                exit "$code"
              fi
              echo "Transient infrastructure failure (attempt ${attempt}/${max_attempts}); retrying in 30s..."
              attempt=$((attempt + 1))
              sleep 30
              continue
            fi
            # Real spec failure — fail immediately, do not retry.
            exit "$code"
          done

  jest:
    runs-on: ubuntu-latest
    name: jest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        # Jest runs frontend JS in jsdom and never launches Electron, so skip
        # the Electron binary download. It is the one network dependency in
        # this step that intermittently 504s on the CDN and fails the whole
        # job even though no test needs the binary.
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: Fetch renderer vendor assets (markdown-it, katex)
        continue-on-error: true
        run: |
          mkdir -p docker/services/ruby/public/vendor/js
          curl -fsSL https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js -o docker/services/ruby/public/vendor/js/markdown-it.min.js || echo "markdown-it fetch failed; renderer tests will skip"
          curl -fsSL https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.js -o docker/services/ruby/public/vendor/js/katex.min.js || echo "katex fetch failed; renderer tests will skip"

      - name: Run jest
        run: npm test
