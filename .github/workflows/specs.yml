name: Specs

# Route-contract integration specs run under both IN_CONTAINER modes,
# plus the frontend Jest suite. The dual integration matrix exists
# because every path-resolution defect this codebase has shipped
# (jupyter_helper hard-coded /Users/yohasebe, auto_forge container-vs-host
# path mix-ups) had the same shape: the production (in_container) branch
# worked, the dev (host) branch silently broke. Running the smoke suite
# under both IN_CONTAINER=true and IN_CONTAINER=false catches the
# asymmetry the moment it lands.
#
# The Ruby `unit` suite runs on CI since 2026-06 (it was excluded between
# 2026-05-09 and then because test-order pollution made full runs flaky;
# that was root-caused and fixed — see the refactoring Phase 0 notes).
# Environment-dependent specs (running containers, provider API keys)
# guard themselves with `skip`, so the suite is green without secrets:
# none are provisioned here (avoids fork-PR exfil risk + API billing).
# Release decisions still rest on the full local run under the
# developer's Docker + env setup, where the skipped specs execute too.

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  rspec-integration:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        in_container: ['true', 'false']
    name: rspec integration (IN_CONTAINER=${{ matrix.in_container }})
    defaults:
      run:
        working-directory: docker/services/ruby
    env:
      IN_CONTAINER: ${{ matrix.in_container }}
      # Test against the prebuilt images matching this branch: dev pushes
      # publish :dev (see publish-images.yml tag policy), main/PRs use the
      # released :latest. Without this, dev CI would pull :latest and test
      # new code against released service images.
      MONADIC_IMAGE_TAG: ${{ github.ref_name == 'dev' && 'dev' || 'latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          working-directory: docker/services/ruby

      - name: Install GraphViz (used by some unit specs)
        run: sudo apt-get update && sudo apt-get install -y graphviz libgraphviz-dev pkg-config

      - name: Wait for image publish on this commit (if any)
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # A push that touches docker/services/** triggers publish-images
          # in PARALLEL with this workflow, and this job pulls the very tags
          # that run is busy (re)publishing. Pulling mid-publish 404s on
          # first-ever packages ("manifest unknown" / "denied") and races
          # the manifest swap otherwise — the recurring source of false
          # red Specs runs + failure emails on image-touching pushes.
          # Wait for any publish-images run on the same SHA to finish
          # before composing up; pushes that did not trigger one fall
          # through immediately.
          for i in $(seq 1 40); do
            active=$(gh api \
              "repos/${GITHUB_REPOSITORY}/actions/workflows/publish-images.yml/runs?head_sha=${GITHUB_SHA}&per_page=10" \
              --jq '[.workflow_runs[] | select(.status != "completed")] | length' 2>/dev/null || echo 0)
            if [ "${active}" = "0" ]; then
              echo "No in-progress publish-images run for ${GITHUB_SHA}; proceeding."
              exit 0
            fi
            echo "publish-images in progress for this commit (${active} run(s)); waiting 30s... (${i}/40)"
            sleep 30
          done
          echo "::warning::publish-images still running after 20 minutes; proceeding anyway"

      - name: Run route-contract integration specs (both IN_CONTAINER modes)
        run: |
          # Retry ONLY transient infrastructure failures (Docker Hub pull
          # timeouts / container startup), not real spec failures. The
          # IN_CONTAINER=false job builds peer containers locally, so a flaky
          # registry pull would otherwise fail the build and email maintainers.
          attempt=1
          max_attempts=3
          while true; do
            set +e
            output=$(bundle exec rspec \
              spec/integration/json_route_contract_spec.rb \
              spec/integration/library_import_contract_spec.rb \
              --format progress 2>&1)
            code=$?
            set -e
            echo "$output"
            if [ "$code" -eq 0 ]; then
              exit 0
            fi
            # ghcr markers ("manifest unknown" / "denied") cover the residual
            # image-publish race the wait step above can miss (e.g. a publish
            # run created after this job started) and first-publish private
            # packages awaiting the one-time public toggle.
            if echo "$output" | grep -qiE "Container startup timeout|failed to solve|i/o timeout|context deadline exceeded|registry-1\.docker\.io|TLS handshake timeout|temporary failure in name resolution|manifest unknown|denied: requested access|ghcr\.io.*denied"; then
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "::warning::Transient container/registry failure persisted after ${max_attempts} attempts"
                exit "$code"
              fi
              echo "Transient infrastructure failure (attempt ${attempt}/${max_attempts}); retrying in 30s..."
              attempt=$((attempt + 1))
              sleep 30
              continue
            fi
            # Real spec failure — fail immediately, do not retry.
            exit "$code"
          done

  rspec-unit:
    runs-on: ubuntu-latest
    name: rspec unit
    defaults:
      run:
        working-directory: docker/services/ruby
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          working-directory: docker/services/ruby

      - name: Install GraphViz (used by some unit specs)
        run: sudo apt-get update && sudo apt-get install -y graphviz libgraphviz-dev pkg-config

      - name: Run unit specs
        # ~integration: a few docker-dependent spec files under spec/unit
        # carry :integration metadata; excluding the tag also keeps the
        # spec_helper before(:suite) hook from starting containers here.
        run: bundle exec rspec spec/unit --tag '~integration' --order random --format progress

  jest:
    runs-on: ubuntu-latest
    name: jest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        # Jest runs frontend JS in jsdom and never launches Electron, so skip
        # the Electron binary download. It is the one network dependency in
        # this step that intermittently 504s on the CDN and fails the whole
        # job even though no test needs the binary.
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: Fetch renderer vendor assets (markdown-it, katex)
        continue-on-error: true
        run: |
          mkdir -p docker/services/ruby/public/vendor/js
          curl -fsSL https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js -o docker/services/ruby/public/vendor/js/markdown-it.min.js || echo "markdown-it fetch failed; renderer tests will skip"
          curl -fsSL https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.js -o docker/services/ruby/public/vendor/js/katex.min.js || echo "katex fetch failed; renderer tests will skip"

      - name: Run jest
        run: npm test
