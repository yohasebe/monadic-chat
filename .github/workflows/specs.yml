name: Specs

# Route-contract integration specs run under both IN_CONTAINER modes,
# plus the frontend Jest suite. The dual integration matrix exists
# because every path-resolution defect this codebase has shipped
# (jupyter_helper hard-coded /Users/yohasebe, auto_forge container-vs-host
# path mix-ups) had the same shape: the production (in_container) branch
# worked, the dev (host) branch silently broke. Running the smoke suite
# under both IN_CONTAINER=true and IN_CONTAINER=false catches the
# asymmetry the moment it lands.
#
# The Ruby `unit` suite is intentionally NOT run on CI (since 2026-05-09).
# 26 of its ~4040 specs depend on either (a) a running Python container
# whose image matches the current Dockerfile or (b) provider API keys
# in env (OPENAI_API_KEY, TAVILY_API_KEY, ...). Neither is set up in CI:
# secrets are not provisioned (avoids fork-PR exfil risk + API billing),
# and the python container is not rebuilt in CI. The full unit suite
# runs locally under the developer's full Docker + env setup, where
# release decisions are actually made; CI's role is reduced to the
# environment-independent layers (route smoke + frontend tests) so the
# signal it does emit is genuine. See feedback_release_manifest_drift.md
# for the related operational philosophy.

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  rspec-integration:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        in_container: ['true', 'false']
    name: rspec integration (IN_CONTAINER=${{ matrix.in_container }})
    defaults:
      run:
        working-directory: docker/services/ruby
    env:
      IN_CONTAINER: ${{ matrix.in_container }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          working-directory: docker/services/ruby

      - name: Install GraphViz (used by some unit specs)
        run: sudo apt-get update && sudo apt-get install -y graphviz libgraphviz-dev pkg-config

      - name: Run route-contract integration specs (both IN_CONTAINER modes)
        run: |
          bundle exec rspec \
            spec/integration/json_route_contract_spec.rb \
            spec/integration/library_import_contract_spec.rb \
            --format progress

  jest:
    runs-on: ubuntu-latest
    name: jest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run jest
        run: npm test
