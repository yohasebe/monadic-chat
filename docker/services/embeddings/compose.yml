services:
  embeddings_service:
    # No profile: this is a base service (always starts with Monadic Chat)
    # because the Help system depends on it for query embedding.
    # Prebuilt multi-arch image published by .github/workflows/publish-images.yml
    # (torch + multilingual-e5-base baked in; user-independent content).
    # Production installs pull instead of building; local builds for
    # development use the compose.dev.yml overlay (MONADIC_DEV=true).
    image: ghcr.io/yohasebe/monadic-embeddings:latest
    container_name: monadic-chat-embeddings-container
    networks:
      - monadic-chat-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: "no"
