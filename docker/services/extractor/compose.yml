services:
  extractor_service:
    profiles: ["extractor"]
    image: yohasebe/monadic-extractor
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT_TAG: "monadic-chat"
    container_name: monadic-chat-extractor-container
    environment:
      # OCR backend and language hints are runtime settings; the image
      # content does not depend on them (Docling models cover all of them).
      EXTRACTOR_OCR_RUNTIME: ${EXTRACTOR_OCR:-rapidocr}
      EXTRACTOR_LANGS_RUNTIME: ${EXTRACTOR_LANGS:-en,ja,zh,ko}
    volumes:
      - data:/monadic/data
      - ~/monadic/data:/monadic/data
    networks:
      - monadic-chat-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    restart: "no"
