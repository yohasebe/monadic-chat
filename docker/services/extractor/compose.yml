services:
  extractor_service:
    profiles: ["extractor"]
    image: yohasebe/monadic-extractor
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT_TAG: "monadic-chat"
        EXTRACTOR_OCR: ${EXTRACTOR_OCR:-rapidocr}
        EXTRACTOR_LANGS: ${EXTRACTOR_LANGS:-en,ja,zh,ko}
    container_name: monadic-chat-extractor-container
    volumes:
      - data:/monadic/data
      - ~/monadic/data:/monadic/data
    networks:
      - monadic-chat-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    restart: "no"
