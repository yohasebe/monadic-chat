services:
  extractor_service:
    profiles: ["extractor"]
    # Prebuilt multi-arch image published by .github/workflows/publish-images.yml.
    # The image is user-independent (OCR languages/backend are runtime env),
    # so production installs pull instead of building. Local builds for
    # development use the compose.dev.yml overlay (MONADIC_DEV=true).
    # MONADIC_IMAGE_TAG (default latest) allows pinning a released
    # :<version> tag or following :dev — see publish-images.yml tag policy.
    image: ghcr.io/yohasebe/monadic-extractor:${MONADIC_IMAGE_TAG:-latest}
    container_name: monadic-chat-extractor-container
    environment:
      # OCR backend and language hints are runtime settings; the image
      # content does not depend on them (Docling models cover all of them).
      EXTRACTOR_OCR_RUNTIME: ${EXTRACTOR_OCR:-rapidocr}
      EXTRACTOR_LANGS_RUNTIME: ${EXTRACTOR_LANGS:-en,ja,zh,ko}
    volumes:
      - data:/monadic/data
      - ~/monadic/data:/monadic/data
    networks:
      - monadic-chat-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    restart: "no"
