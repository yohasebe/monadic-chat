services:
  privacy_service:
    profiles: ["privacy"]
    image: yohasebe/monadic-privacy
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT_TAG: "monadic-chat"
    container_name: monadic-chat-privacy-container
    environment:
      # All spaCy models are baked into the image; this selects which
      # languages the server loads. Changing PRIVACY_LANGS only needs a
      # container restart, not a rebuild.
      PRIVACY_LANGS_RUNTIME: ${PRIVACY_LANGS:-en}
    networks:
      - monadic-chat-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: "no"
