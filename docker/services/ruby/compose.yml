services:
  ruby_service:
    image: yohasebe/monadic-chat:${MONADIC_VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT_TAG: "monadic-chat"
        GEMS_FINGERPRINT: ${GEMS_FINGERPRINT:-unknown}
    container_name: monadic-chat-ruby-container
    environment:
      HOST_OS: ${HOST_OS}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - data:/monadic/data
      - ~/monadic/data:/monadic/data
      - config:/monadic/config
      - ~/monadic/config:/monadic/config
      - log:/monadic/log
      - ~/monadic/log:/monadic/log
    ports:
      - "${HOST_BINDING:-127.0.0.1}:4567:4567"
    stdin_open: true
    tty: true
    command: ["sh", "/usr/local/bin/entrypoint.sh"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - monadic-chat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4567/"]
      interval: 3s
      timeout: 5s
      retries: 8
      start_period: 3s
    depends_on:
      pgvector_service:
        condition: service_healthy
      # Python dependency removed: Ruby communicates with Python only via
      # docker exec (on user interaction), not at startup. Both containers
      # now start in parallel for faster startup time.
      # Python availability is checked dynamically by WebAutomation.available?
