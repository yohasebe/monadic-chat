services:
  ruby_service:
    image: yohasebe/monadic-chat:${MONADIC_VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT_TAG: "monadic-chat"
        GEMS_FINGERPRINT: ${GEMS_FINGERPRINT:-unknown}
    container_name: monadic-chat-ruby-container
    environment:
      HOST_OS: ${HOST_OS}
      PRIVACY_FILTER: ${PRIVACY_FILTER:-true}
      PRIVACY_LANGS: ${PRIVACY_LANGS:-en}
      EXTRACTOR_SERVICE: ${EXTRACTOR_SERVICE:-}
      EXTRACTOR_LANGS: ${EXTRACTOR_LANGS:-}
      EXTRA_LOGGING: ${EXTRA_LOGGING:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - data:/monadic/data
      - ~/monadic/data:/monadic/data
      - config:/monadic/config
      - ~/monadic/config:/monadic/config
      - log:/monadic/log
      - ~/monadic/log:/monadic/log
    ports:
      - "${HOST_BINDING:-127.0.0.1}:4567:4567"
    stdin_open: true
    tty: true
    command: ["sh", "/usr/local/bin/entrypoint.sh"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - monadic-chat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4567/"]
      interval: 3s
      timeout: 5s
      retries: 8
      start_period: 3s
    # No depends_on. The Ruby service comes up immediately and waits for
    # qdrant + embeddings via application-level retry. Tight depends_on
    # ordering is undesirable here because the embeddings container takes
    # ~30-60 seconds to load multilingual-e5-base on first start, and we
    # want the Ruby web UI reachable before that finishes.
    # Python availability is checked dynamically by WebAutomation.available?
