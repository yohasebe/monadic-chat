# Hard task: Real-time chat UI with state management
#
# Tests complex state, event handling, multi-component coordination.
# A correct LLM should take 5-10 iterations. Stretches the "single-file
# web app" boundary toward what AutoForge is typically asked to do in
# real-world use.

id: hard_chat_ui
difficulty: hard
loc_target: 800

description: |
  Build a real-time chat UI as a single HTML file. This is a mock UI
  (no backend) but should feel like a working chat application.

  Requirements:
  - A scrollable message area showing a chat history
  - An input area at the bottom with a textarea and a "Send" button
  - Pressing Enter sends the message (Shift+Enter for newline)
  - When the user sends a message, it appears in the history as a "user"
    bubble (right-aligned, distinct color)
  - 1-2 seconds after sending, a mock "assistant" reply appears as an
    "assistant" bubble (left-aligned, different color). The reply text
    can be a canned response (e.g., echoing the user's message with a
    prefix like "You said: ...")
  - A typing indicator (animated dots) appears in the history while the
    assistant is "thinking" (during the 1-2 second delay)
  - The message area auto-scrolls to the bottom on new messages
  - A sidebar listing 3-5 mock "conversations" the user can click to switch
    contexts. Clicking a conversation loads its history (each conversation
    has its own independent message list, state persists during the
    session in memory)
  - A "New conversation" button in the sidebar that creates a fresh chat
  - The active conversation is visually highlighted in the sidebar
  - Persist all conversations to localStorage so they survive page reload
  - Markdown-like formatting in messages: **bold** and *italic* render
    inline (simple parser is fine, full Markdown not required)

  Single HTML file. CDN libraries OK. Visual design at your discretion
  but should be clean and chat-like (think: a simplified Slack or
  ChatGPT clone).

rubric_items:
  - id: html_single_file
    description: "Output is a single .html file"
    type: binary
  - id: message_area
    description: "Scrollable message area is present and visible"
    type: binary
  - id: input_send
    description: "Input area with textarea + Send button works"
    type: binary
  - id: user_bubble
    description: "User messages appear as right-aligned, distinctly styled bubbles"
    type: binary
  - id: assistant_bubble
    description: "Assistant replies appear as left-aligned, distinctly styled bubbles"
    type: binary
  - id: enter_to_send
    description: "Pressing Enter sends; Shift+Enter inserts newline"
    type: binary
  - id: typing_indicator
    description: "An animated typing indicator appears during the 1-2s assistant delay"
    type: binary
  - id: auto_scroll
    description: "Message area auto-scrolls to the bottom on new messages"
    type: binary
  - id: sidebar_present
    description: "Sidebar with 3+ mock conversations is present"
    type: binary
  - id: conversation_switch
    description: "Clicking a sidebar entry switches to that conversation's history"
    type: binary
  - id: active_highlight
    description: "Active conversation is visually distinguished in the sidebar"
    type: binary
  - id: new_conversation
    description: "New conversation button creates a fresh chat in the sidebar"
    type: binary
  - id: state_persistence
    description: "After page reload, conversations and their histories are restored from localStorage"
    type: binary
  - id: inline_formatting
    description: "**bold** and *italic* render inline in messages, not as literal text"
    type: binary
  - id: clean_structure
    description: "Code is organized into recognizable sections (e.g., state, render, events) and not a single 800-line wall"
    type: graded
    scale: 0-2

smoke_test:
  - action: open
    target: "{{output_file}}"
  - action: type_in_input
    target: "Hello"
  - action: press_key
    key: "Enter"
  - action: assert_message_visible
    role: "user"
    text: "Hello"
  - action: wait
    duration_ms: 2500
  - action: assert_message_visible
    role: "assistant"
  - action: click_sidebar_entry
    index: 1
  - action: assert_message_area_changed
  - action: click_sidebar_entry
    index: 0
  - action: assert_message_visible
    role: "user"
    text: "Hello"
  - action: reload_page
  - action: assert_message_visible
    role: "user"
    text: "Hello"
