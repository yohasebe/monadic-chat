# Medium task: Markdown editor with live preview
#
# Tests multi-feature integration: state synchronization between
# textarea and preview, parsing logic (or library invocation), basic
# UI layout. Should take a competent LLM 3-6 iterations.

id: medium_markdown_editor
difficulty: medium
loc_target: 500

description: |
  Build a Markdown editor with live preview as a single HTML file.
  Requirements:
  - A textarea on the left where the user types Markdown
  - A preview pane on the right that updates in real time as the user types
  - Support at minimum: headers (#, ##, ###), bold (**...**), italic (*...*),
    links ([text](url)), inline code (`...`), code blocks (```...```),
    unordered lists (-), ordered lists (1.)
  - A toolbar with buttons for the most common operations (bold, italic,
    heading, link) that insert the corresponding Markdown into the textarea
  - A character counter and word counter at the bottom
  - The layout should be responsive: side-by-side on wide screens,
    stacked on narrow screens

  All HTML, CSS, and JavaScript in a single file. You may use a CDN-hosted
  Markdown parsing library (e.g., marked.js) or write your own parser; the
  choice is left to your judgment.

rubric_items:
  - id: html_single_file
    description: "Output is a single .html file (CDN libraries are OK)"
    type: binary
  - id: textarea_present
    description: "An editable textarea is present"
    type: binary
  - id: preview_present
    description: "A preview pane is present, separate from the textarea"
    type: binary
  - id: live_update
    description: "Preview updates as the user types (input or keyup event)"
    type: binary
  - id: headers_render
    description: "# H1, ## H2, ### H3 all render as appropriate heading levels"
    type: binary
  - id: bold_italic_render
    description: "**bold** and *italic* render correctly (not as literal text)"
    type: binary
  - id: code_blocks_render
    description: "```...``` renders as a <pre><code> block, distinguishable from inline code"
    type: binary
  - id: lists_render
    description: "Both - lists and 1. lists render correctly"
    type: binary
  - id: toolbar_present
    description: "A toolbar with at least 4 buttons (bold/italic/heading/link) is present"
    type: binary
  - id: toolbar_works
    description: "Clicking a toolbar button inserts the corresponding Markdown into the textarea"
    type: binary
  - id: counters_present
    description: "Both character and word counters are visible and update live"
    type: binary
  - id: responsive_layout
    description: "Layout adapts to viewport width (verify via window resize)"
    type: binary

smoke_test:
  - action: open
    target: "{{output_file}}"
  - action: type_in_textarea
    target: "# Hello\n\n**bold** *italic*"
  - action: wait
    duration_ms: 500
  - action: assert_preview_contains_html
    selector: "h1"
    text: "Hello"
  - action: assert_preview_contains_html
    selector: "strong"
    text: "bold"
  - action: assert_preview_contains_html
    selector: "em"
    text: "italic"
  - action: click_toolbar_button
    target: "bold"
  - action: assert_textarea_contains
    text: "**"
